<!DOCTYPE html>
<html>
<head>
<title>Divide and Conquer Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Divide and Conquer Algorithm Visualizer</h1>

<select id="algorithm">
<option>Merge Sort</option>
<option>Quick Sort</option>
<option>Min Max</option>
<option>Largest Subarray</option>
</select>

<input type="text" id="inputArray" placeholder="Enter numbers like 8,3,5,2">

<button onclick="runAlgorithm()">Run</button>

<h2>Steps</h2>
<div id="steps"></div>

<h2>Time Complexity</h2>
<div id="complexity"></div>

<script src="script.js"></script>

</body>
</html>
